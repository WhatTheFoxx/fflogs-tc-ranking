<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLogs 繁中服 Savage 排名</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d1a;
      --surface:  #161628;
      --border:   #2a2a45;
      --gold:     #c9a84c;
      --gold-dim: #8a6e2f;
      --text:     #ddd5c2;
      --text-dim: #888;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; min-height: 100vh; }

    /* Header */
    header {
      background: linear-gradient(135deg, #0a0a18, #1a1535);
      border-bottom: 1px solid var(--gold-dim);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .header-left h1 { font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
    .header-left p  { font-size: .78rem; color: var(--text-dim); margin-top: 2px; }
    .donate-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #8b1a1a, #c0392b);
      color: #fff; text-decoration: none; padding: 8px 18px;
      border-radius: 20px; font-size: .85rem; font-weight: 600; transition: opacity .2s;
    }
    .donate-btn:hover { opacity: .85; }
    .refresh-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
      background: rgba(255,255,255,.06); color: var(--text-dim);
      font-size: 1.1rem; cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .refresh-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* Boss tabs */
    .boss-tabs {
      display: flex; gap: 4px; padding: 16px 24px 0;
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .boss-tab {
      padding: 9px 20px; border: 1px solid var(--border); border-bottom: none;
      border-radius: 6px 6px 0 0; background: var(--surface); color: var(--text-dim);
      cursor: pointer; font-size: .88rem; white-space: nowrap; transition: all .2s;
    }
    .boss-tab:hover { color: var(--text); border-color: var(--gold-dim); }
    .boss-tab.active { background: #1e1e38; color: var(--gold); border-color: var(--gold-dim); border-bottom-color: #1e1e38; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 12px; padding: 12px 24px;
      background: #1e1e38; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .toolbar-label { font-size: .78rem; color: var(--text-dim); white-space: nowrap; }

    /* Role group + Job selector */
    .selector-wrap { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .role-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .role-pill {
      padding: 5px 16px; border-radius: 20px; border: 1px solid var(--border);
      cursor: pointer; font-size: .8rem; font-weight: 700;
      background: rgba(255,255,255,.04); color: var(--text-dim);
      transition: all .15s; white-space: nowrap; letter-spacing: .3px;
    }
    .role-pill:hover { background: rgba(255,255,255,.1); }
    .role-pill.active { background: rgba(255,255,255,.15); border-color: currentColor; }

    .divider { height: 1px; background: var(--border); }

    .job-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .job-pill {
      padding: 4px 12px; border-radius: 20px; border: 1px solid transparent;
      cursor: pointer; font-size: .78rem; font-weight: 600;
      background: rgba(255,255,255,.04); color: var(--text-dim);
      transition: all .15s; white-space: nowrap;
    }
    .job-pill:hover { background: rgba(255,255,255,.1); color: var(--text); }
    .job-pill.active { border-color: currentColor; background: rgba(255,255,255,.12); }

    .toolbar-right { margin-left: auto; font-size: .75rem; color: var(--text-dim); white-space: nowrap; align-self: flex-start; }

    /* Table */
    .table-wrap { padding: 20px 24px; overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: .88rem; min-width: 480px; }
    th { background: #1a1a32; color: var(--gold); font-size: .75rem; font-weight: 600; text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--gold-dim); white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }

    .rank-badge { display: inline-block; min-width: 26px; text-align: center; font-weight: 700; font-size: .8rem; color: var(--text-dim); }
    .rank-badge.r1 { color: #FFD700; }
    .rank-badge.r2 { color: #C0C0C0; }
    .rank-badge.r3 { color: #CD7F32; }
    .num  { font-family: 'Consolas',monospace; }
    .rdps { color: var(--gold); font-weight: 600; }
    .dim  { color: var(--text-dim); font-size: .8rem; }

    /* Status */
    .status-box { padding: 60px 24px; text-align: center; color: var(--text-dim); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #e87b7b; }

    footer { text-align: center; padding: 20px; font-size: .75rem; color: var(--text-dim); border-top: 1px solid var(--border); margin-top: 20px; }
    footer a { color: var(--gold-dim); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚔ FFLogs 繁中服 Savage 排名</h1>
    <p>Arcadion (AAC Light-Heavyweight) · Zone 62 · 僅含TC伺服器擊殺紀錄</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="refresh-btn" onclick="clearCookiesAndReload()" title="清除快取並重新整理">↻</button>
    <!-- 將 href 換成你的 Donate 連結 -->
    <a class="donate-btn" href="#" target="_blank" rel="noopener">❤ Donate</a>
  </div>
</header>

<div class="boss-tabs" id="bossTabs"></div>

<div class="toolbar">
  <span class="toolbar-label">職業</span>
  <div class="selector-wrap">
    <div class="role-pills" id="rolePills"></div>
    <div class="divider"></div>
    <div class="job-pills" id="jobPills"></div>
  </div>
  <div class="toolbar-right" id="toolbarRight"></div>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="status-box"><div class="spinner"></div>載入中...</div>
</div>

<footer>
  資料來源：<a href="https://www.fflogs.com" target="_blank" rel="noopener">FFLogs</a>
  &nbsp;·&nbsp; 僅供參考，非官方排名
</footer>

<script>
const BOSSES = [
  'Black Cat Savage',
  'Honey B. Lovely Savage',
  'Brute Bomber Savage',
  'Wicked Thunder Savage',
];
const BOSS_LABELS = {
  'Black Cat Savage':       'Black Cat',
  'Honey B. Lovely Savage': 'Honey B. Lovely',
  'Brute Bomber Savage':    'Brute Bomber',
  'Wicked Thunder Savage':  'Wicked Thunder',
};

const ROLE_GROUPS = {
  'Tank':   ['Paladin','Warrior','DarkKnight','Gunbreaker'],
  'Healer': ['WhiteMage','Scholar','Astrologian','Sage'],
  'Melee':  ['Ninja','Monk','Reaper','Dragoon','Samurai','Viper'],
  'Range':  ['Bard','Dancer','Machinist'],
  'Cast':   ['BlackMage','Pictomancer','Summoner','RedMage'],
};

const ROLE_COLORS = {
  'Tank':   '#A8D2E6',
  'Healer': '#FFF0DC',
  'Melee':  '#D69C00',
  'Range':  '#91BA5E',
  'Cast':   '#A579D6',
};

const JOB_COLORS = {
  Astrologian:'#FFE74A', Bard:'#91BA5E', BlackMage:'#A579D6',
  BlueMage:'#B38BFF',   Dancer:'#E2B0AF', DarkKnight:'#D126CC',
  Dragoon:'#4164CD',    Gunbreaker:'#796D30', Machinist:'#6EE1D6',
  Monk:'#D69C00',       Ninja:'#AF1964',  Paladin:'#A8D2E6',
  Pictomancer:'#FD97C7',Reaper:'#965A80', RedMage:'#E87B7B',
  Sage:'#80A0F0',       Samurai:'#E46D04',Scholar:'#8657FF',
  Summoner:'#2D9B78',   Viper:'#3DAA74',  Warrior:'#CF2621',
  WhiteMage:'#FFF0DC',
};

// 職業顯示順序（依角色分組）
const JOB_ORDER = [
  'Paladin','Warrior','DarkKnight','Gunbreaker',          // Tank
  'WhiteMage','Scholar','Astrologian','Sage',             // Healer
  'Monk','Dragoon','Ninja','Samurai','Reaper','Viper',    // 近戰 DPS
  'Bard','Machinist','Dancer',                            // 遠端 DPS
  'BlackMage','Summoner','RedMage','Pictomancer','BlueMage', // 魔法 DPS
];

let currentBoss = 0;
let currentJob  = 'Astrologian';
let currentRole = null;          // null = job mode, string = role group mode
let bestData    = null;

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  // Boss tabs
  const tabs = document.getElementById('bossTabs');
  BOSSES.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'boss-tab' + (i === 0 ? ' active' : '');
    btn.textContent = BOSS_LABELS[b];
    btn.onclick = () => selectBoss(i);
    tabs.appendChild(btn);
  });

  // Load data
  try {
    const res = await fetch('data_best.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    bestData = await res.json();
    buildRolePills();
    buildJobPills();
    render();
  } catch(e) {
    showError(`無法載入資料：${e.message}`);
  }
})();

// ── Role pills ────────────────────────────────────────────────────────────────
function buildRolePills() {
  const pills = document.getElementById('rolePills');
  pills.innerHTML = '';
  Object.keys(ROLE_GROUPS).forEach(role => {
    const color = ROLE_COLORS[role] || '#aaa';
    const pill  = document.createElement('button');
    pill.className = 'role-pill' + (role === currentRole ? ' active' : '');
    pill.textContent = role;
    pill.style.color = color;
    if (role === currentRole) pill.style.borderColor = color;
    pill.onclick = () => selectRole(role);
    pills.appendChild(pill);
  });
}

function selectRole(role) {
  currentRole = role;
  currentJob  = null;
  document.querySelectorAll('.role-pill').forEach(p => {
    const active = p.textContent === role;
    p.classList.toggle('active', active);
    p.style.borderColor = active ? (ROLE_COLORS[role] || '#aaa') : '';
  });
  document.querySelectorAll('.job-pill').forEach(p => {
    p.classList.remove('active');
    p.style.borderColor = 'transparent';
  });
  render();
}

// ── Job pills ─────────────────────────────────────────────────────────────────
function buildJobPills() {
  // 取得當前 boss 有資料的職業
  const allJobs = new Set();
  BOSSES.forEach(b => {
    (bestData.bosses[b] || []).forEach(r => allJobs.add(r['職業']));
  });

  // 英文字母排序
  const sorted = [...allJobs].sort((a, b) => a.localeCompare(b));

  const pills = document.getElementById('jobPills');
  pills.innerHTML = '';
  sorted.forEach(job => {
    const color = JOB_COLORS[job] || '#aaa';
    const pill  = document.createElement('button');
    pill.className = 'job-pill' + (job === currentJob ? ' active' : '');
    pill.textContent = job;
    pill.style.color = color;
    if (job === currentJob) pill.style.borderColor = color;
    pill.onclick = () => selectJob(job);
    pills.appendChild(pill);
  });
}

function selectJob(job) {
  currentJob  = job;
  currentRole = null;
  document.querySelectorAll('.role-pill').forEach(p => {
    p.classList.remove('active');
    p.style.borderColor = '';
  });
  document.querySelectorAll('.job-pill').forEach(p => {
    const active = p.textContent === job;
    p.classList.toggle('active', active);
    p.style.borderColor = active ? (JOB_COLORS[job] || '#aaa') : 'transparent';
  });
  render();
}

function selectBoss(i) {
  currentBoss = i;
  document.querySelectorAll('.boss-tab').forEach((t, j) => t.classList.toggle('active', i === j));
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!bestData) return;

  const boss = BOSSES[currentBoss];
  const all  = bestData.bosses[boss] || [];

  // ── Role group mode ──────────────────────────────────────────────────────
  if (currentRole) {
    const jobs    = new Set(ROLE_GROUPS[currentRole] || []);
    const color   = ROLE_COLORS[currentRole] || '#aaa';
    // collect all players whose job belongs to this role, sorted by rDPS desc
    const matched = all
      .filter(r => jobs.has(r['職業']))
      .slice()
      .sort((a, b) => parseFloat(b['rDPS']) - parseFloat(a['rDPS']));

    document.getElementById('toolbarRight').textContent =
      `更新：${bestData.updated}　共 ${matched.length} 位玩家`;

    if (!matched.length) {
      document.getElementById('tableWrap').innerHTML =
        '<div class="status-box">此職業組合在這個副本暫無資料</div>';
      return;
    }

    const rowsHtml = matched.map((r, idx) => {
      const rk    = idx + 1;
      const badge = `<span class="rank-badge${rk===1?' r1':rk===2?' r2':rk===3?' r3':''}">#${rk}</span>`;
      const jc    = JOB_COLORS[r['職業']] || '#aaa';
      return `<tr>
        <td>${badge}</td>
        <td style="color:${jc};font-weight:500">${esc(r['玩家名稱'])}</td>
        <td class="dim">${esc(r['職業'])}</td>
        <td class="num">${fmt(r['DPS'])}</td>
        <td class="num rdps">${fmt(r['rDPS'])}</td>
        <td class="num">${fmt(r['aDPS'])}</td>
        <td class="dim">${r['戰鬥時長(秒)']}s</td>
      </tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead><tr>
          <th>排名</th>
          <th style="color:${color}">玩家名稱</th>
          <th>職業</th>
          <th>DPS</th><th>rDPS</th><th>aDPS</th><th>時長</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;
    return;
  }

  // ── Single job mode ──────────────────────────────────────────────────────
  const rows  = all.filter(r => r['職業'] === currentJob);
  const color = JOB_COLORS[currentJob] || '#aaa';

  document.getElementById('toolbarRight').textContent =
    `更新：${bestData.updated}　共 ${rows.length} 位玩家`;

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML =
      '<div class="status-box">此職業在這個副本暫無資料</div>';
    return;
  }

  const rowsHtml = rows.map(r => {
    const rk = +r['同職業排名'];
    const badge = `<span class="rank-badge${rk===1?' r1':rk===2?' r2':rk===3?' r3':''}">#${rk}</span>`;
    return `<tr>
      <td>${badge}</td>
      <td style="color:${color};font-weight:500">${esc(r['玩家名稱'])}</td>
      <td class="num">${fmt(r['DPS'])}</td>
      <td class="num rdps">${fmt(r['rDPS'])}</td>
      <td class="num">${fmt(r['aDPS'])}</td>
      <td class="dim">${r['戰鬥時長(秒)']}s</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>排名</th>
        <th style="color:${color}">玩家名稱</th>
        <th>DPS</th><th>rDPS</th><th>aDPS</th><th>時長</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

// ── Refresh ───────────────────────────────────────────────────────────────────
function clearCookiesAndReload() {
  // 清除所有 cookie
  document.cookie.split(';').forEach(c => {
    document.cookie = c.trim().split('=')[0] + '=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
  });
  // 強制重新向 server 取資料（bypass cache）
  location.reload(true);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v) {
  const n = parseFloat(v);
  return isNaN(n) ? v : n.toLocaleString('en-US', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showError(msg) {
  document.getElementById('tableWrap').innerHTML =
    `<div class="status-box err">⚠ ${esc(msg)}</div>`;
}
</script>
</body>
</html>
