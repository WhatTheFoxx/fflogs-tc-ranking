<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFLogs 繁中服 Savage 排名</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #161628;
      --border:    #2a2a45;
      --gold:      #c9a84c;
      --gold-dim:  #8a6e2f;
      --text:      #ddd5c2;
      --text-dim:  #888;
      --tank-bg:   rgba(70,100,205,0.08);
      --heal-bg:   rgba(46,155,120,0.08);
      --dps-bg:    rgba(200,60,60,0.08);
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; min-height: 100vh; }

    /* Header */
    header {
      background: linear-gradient(135deg, #0a0a18, #1a1535);
      border-bottom: 1px solid var(--gold-dim);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .header-left h1 { font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
    .header-left p  { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .donate-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #8b1a1a, #c0392b);
      color: #fff; text-decoration: none; padding: 8px 18px;
      border-radius: 20px; font-size: 0.85rem; font-weight: 600; letter-spacing: .5px; transition: opacity .2s;
    }
    .donate-btn:hover { opacity: .85; }

    /* Boss tabs */
    .boss-tabs {
      display: flex; gap: 4px; padding: 16px 24px 0;
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .boss-tab {
      padding: 9px 20px; border: 1px solid var(--border); border-bottom: none;
      border-radius: 6px 6px 0 0; background: var(--surface); color: var(--text-dim);
      cursor: pointer; font-size: .88rem; white-space: nowrap; transition: all .2s;
    }
    .boss-tab:hover { color: var(--text); border-color: var(--gold-dim); }
    .boss-tab.active { background: #1e1e38; color: var(--gold); border-color: var(--gold-dim); border-bottom-color: #1e1e38; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 12px; padding: 14px 24px;
      background: #1e1e38; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .view-btn {
      padding: 6px 16px; background: transparent; border: none;
      color: var(--text-dim); cursor: pointer; font-size: .82rem; transition: all .15s;
    }
    .view-btn + .view-btn { border-left: 1px solid var(--border); }
    .view-btn.active { background: var(--gold); color: #000; font-weight: 700; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .updated-info { font-size: .75rem; color: var(--text-dim); }
    .count-info   { font-size: .78rem; color: var(--text-dim); }

    /* Table */
    .table-wrap { padding: 20px 24px; overflow-x: auto; }
    .role-section { margin-bottom: 28px; background: var(--role-bg,transparent); border-radius: 8px; padding: 14px 16px; }
    .role-header { font-size: .78rem; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); padding: 4px 10px; margin-bottom: 10px; border-left: 3px solid var(--gold-dim); }
    .job-group { margin-bottom: 16px; }
    .job-label { font-size: .78rem; font-weight: 700; padding: 4px 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }

    table { width: 100%; border-collapse: collapse; font-size: .88rem; min-width: 520px; }
    th { background: #1a1a32; color: var(--gold); font-size: .75rem; font-weight: 600; letter-spacing: .5px; text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--gold-dim); white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.03); }

    .rank-badge { display: inline-block; min-width: 26px; text-align: center; font-weight: 700; font-size: .8rem; color: var(--text-dim); }
    .rank-badge.r1 { color: #FFD700; }
    .rank-badge.r2 { color: #C0C0C0; }
    .rank-badge.r3 { color: #CD7F32; }
    .job-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .num { font-family: 'Consolas',monospace; }
    .rdps { color: var(--gold); font-weight: 600; }
    .dim  { color: var(--text-dim); font-size: .8rem; }

    /* Status */
    .status-box { padding: 60px 24px; text-align: center; color: var(--text-dim); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #e87b7b; }

    footer { text-align: center; padding: 20px; font-size: .75rem; color: var(--text-dim); border-top: 1px solid var(--border); margin-top: 20px; }
    footer a { color: var(--gold-dim); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚔ FFLogs 繁中服 Savage 排名</h1>
    <p>Arcadion (AAC Light-Heavyweight) · Zone 62 · 僅含TC伺服器擊殺紀錄</p>
  </div>
  <!-- 將 href 換成你的 Donate 連結 -->
  <a class="donate-btn" href="#" target="_blank" rel="noopener">❤ Donate</a>
</header>

<div class="boss-tabs" id="bossTabs"></div>

<div class="toolbar">
  <div class="view-toggle">
    <button class="view-btn active" id="btnBest" onclick="setView('best')">最佳排名</button>
    <button class="view-btn"        id="btnAll"  onclick="setView('all')">全場次</button>
  </div>
  <div class="toolbar-right">
    <span class="count-info"   id="countInfo"></span>
    <span class="updated-info" id="updatedInfo"></span>
  </div>
</div>

<div class="table-wrap" id="tableWrap">
  <div class="status-box"><div class="spinner"></div>載入中...</div>
</div>

<footer>
  資料來源：<a href="https://www.fflogs.com" target="_blank" rel="noopener">FFLogs</a>
  &nbsp;·&nbsp; 僅供參考，非官方排名
</footer>

<script>
const BOSSES = [
  'Black Cat Savage',
  'Honey B. Lovely Savage',
  'Brute Bomber Savage',
  'Wicked Thunder Savage',
];
const BOSS_LABELS = {
  'Black Cat Savage':       'Black Cat',
  'Honey B. Lovely Savage': 'Honey B. Lovely',
  'Brute Bomber Savage':    'Brute Bomber',
  'Wicked Thunder Savage':  'Wicked Thunder',
};

const JOB_COLORS = {
  Astrologian:'#FFE74A', Bard:'#91BA5E', BlackMage:'#A579D6',
  BlueMage:'#B38BFF', Dancer:'#E2B0AF', DarkKnight:'#D126CC',
  Dragoon:'#4164CD', Gunbreaker:'#796D30', Machinist:'#6EE1D6',
  Monk:'#D69C00', Ninja:'#AF1964', Paladin:'#A8D2E6',
  Pictomancer:'#FD97C7', Reaper:'#965A80', RedMage:'#E87B7B',
  Sage:'#80A0F0', Samurai:'#E46D04', Scholar:'#8657FF',
  Summoner:'#2D9B78', Viper:'#6F2B7F', Warrior:'#CF2621',
  WhiteMage:'#FFF0DC',
};
const TANKS   = new Set(['Paladin','Warrior','DarkKnight','Gunbreaker']);
const HEALERS = new Set(['WhiteMage','Scholar','Astrologian','Sage']);
const roleOf  = j => TANKS.has(j) ? 'TANK' : HEALERS.has(j) ? 'HEALER' : 'DPS';

let currentBoss = 0;
let currentView = 'best';
let bestData = null;   // { updated, bosses }
let allData  = null;

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const tabs = document.getElementById('bossTabs');
  BOSSES.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'boss-tab' + (i === 0 ? ' active' : '');
    btn.textContent = BOSS_LABELS[b];
    btn.onclick = () => selectBoss(i);
    tabs.appendChild(btn);
  });
  loadView();
})();

function selectBoss(i) {
  currentBoss = i;
  document.querySelectorAll('.boss-tab').forEach((t, j) => t.classList.toggle('active', i === j));
  render();
}
function setView(v) {
  currentView = v;
  document.getElementById('btnBest').classList.toggle('active', v === 'best');
  document.getElementById('btnAll') .classList.toggle('active', v === 'all');
  loadView();
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadView() {
  const isBest = currentView === 'best';
  if (isBest ? bestData : allData) { render(); return; }

  showLoading();
  const file = isBest ? 'data_best.json' : 'data_all.json';
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (isBest) bestData = data;
    else        allData  = data;
    render();
  } catch(e) {
    showError(`無法載入 ${file}：${e.message}`);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const src    = currentView === 'best' ? bestData : allData;
  if (!src) return;
  const boss   = BOSSES[currentBoss];
  const rows   = src.bosses[boss] || [];

  document.getElementById('updatedInfo').textContent = `更新時間：${src.updated}`;
  document.getElementById('countInfo').textContent   = `共 ${rows.length} 筆`;

  if (!rows.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="status-box">此副本暫無資料</div>';
    return;
  }
  document.getElementById('tableWrap').innerHTML =
    currentView === 'best' ? renderBest(rows) : renderAll(rows);
}

function badge(n) {
  return `<span class="rank-badge${n===1?' r1':n===2?' r2':n===3?' r3':''}">#${n}</span>`;
}
function dot(job) {
  const c = JOB_COLORS[job] || '#aaa';
  return `<span class="job-dot" style="background:${c}"></span>`;
}
function num(v, cls='num') { return `<span class="${cls}">${parseFloat(v).toLocaleString('en-US',{minimumFractionDigits:1,maximumFractionDigits:1})}</span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderBest(rows) {
  // Group by role then job
  const groups = { TANK:{}, HEALER:{}, DPS:{} };
  rows.forEach(r => {
    const role = roleOf(r['職業']);
    if (!groups[role][r['職業']]) groups[role][r['職業']] = [];
    groups[role][r['職業']].push(r);
  });

  const roleMeta = {
    TANK:   { label:'🛡 坦克 TANK',   bg:'var(--tank-bg)' },
    HEALER: { label:'💚 補師 HEALER', bg:'var(--heal-bg)' },
    DPS:    { label:'⚔ 輸出 DPS',    bg:'var(--dps-bg)'  },
  };

  return ['TANK','HEALER','DPS'].filter(r => Object.keys(groups[r]).length).map(role => {
    const meta = roleMeta[role];
    const jobsHtml = Object.entries(groups[role])
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([job, jrows]) => {
        const color = JOB_COLORS[job] || '#aaa';
        const rowsHtml = jrows.map(r =>
          `<tr>
            <td>${badge(+r['同職業排名'])}</td>
            <td style="color:${color};font-weight:500">${esc(r['玩家名稱'])}</td>
            <td>${num(r['DPS'])}</td>
            <td>${num(r['rDPS'],'num rdps')}</td>
            <td>${num(r['aDPS'])}</td>
            <td class="dim">${r['戰鬥時長(秒)']}s</td>
          </tr>`
        ).join('');
        return `<div class="job-group">
          <div class="job-label" style="color:${color}">${dot(job)}${job}</div>
          <table>
            <thead><tr><th>排名</th><th>玩家名稱</th><th>DPS</th><th>rDPS</th><th>aDPS</th><th>時長</th></tr></thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;
      }).join('');
    return `<div class="role-section" style="--role-bg:${meta.bg}">
      <div class="role-header">${meta.label}</div>
      ${jobsHtml}
    </div>`;
  }).join('');
}

function renderAll(rows) {
  const rowsHtml = rows.map(r => {
    const job = r['職業'], color = JOB_COLORS[job] || '#aaa';
    const rk  = +(r['排名'] ?? r['同職業排名'] ?? 0);
    return `<tr>
      <td>${badge(rk)}</td>
      <td>${dot(job)}<span style="color:${color}">${esc(job)}</span></td>
      <td>${esc(r['玩家名稱'])}</td>
      <td>${num(r['DPS'])}</td>
      <td>${num(r['rDPS'],'num rdps')}</td>
      <td>${num(r['aDPS'])}</td>
      <td class="dim">${r['戰鬥時長(秒)']}s</td>
    </tr>`;
  }).join('');
  return `<table>
    <thead><tr><th>排名</th><th>職業</th><th>玩家名稱</th><th>DPS</th><th>rDPS</th><th>aDPS</th><th>時長</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;
}

function showLoading() {
  document.getElementById('tableWrap').innerHTML = '<div class="status-box"><div class="spinner"></div>載入中...</div>';
  document.getElementById('countInfo').textContent = '';
}
function showError(msg) {
  document.getElementById('tableWrap').innerHTML = `<div class="status-box err">⚠ ${esc(msg)}</div>`;
}
</script>
</body>
</html>
